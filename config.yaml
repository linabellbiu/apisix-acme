email: "your-email@example.com"
domains:
  - "example.com"
  - "*.example.com"

# DNS 服务商选择: alidns, cloudflare, dnspod
dns_provider: "alidns"

# 服务商特定配置 (映射为环境变量)
# 请参考 lego 文档获取各服务商所需的环境变量: https://go-acme.github.io/lego/dns/
dns_provider_config:
  # 阿里云 (Aliyun)
  ALICLOUD_ACCESS_KEY: "your-access-key"
  ALICLOUD_SECRET_KEY: "your-secret-key"
  
  # Cloudflare (如果使用 Cloudflare)
  # CLOUDFLARE_DNS_API_TOKEN: "your-api-token"
  
  # DNSPod (如果使用 DNSPod)
  # DNSPOD_API_KEY: "id,token"

apisix:
  admin_url: "http://127.0.0.1:9180"
  admin_key: "your-admin-token"

data_dir: "./data"
# robfig/cron/v3 New() 默认是分钟级 (5位)，如果需要秒级需要 cron.WithSeconds()。
# 为了通用，我们这里假设标准 5 位 Cron: 分 时 日 月 周
cron_schedule: "0 0 * * *"
lets_encrypt_env: "production"
